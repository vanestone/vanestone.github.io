    <title>@vanestone</title>
    <style>
        body {
            background-color: rgba(0, 0, 0, 0.8);
        }
        
        .box {

            left: 0;
            right: 0;
            margin: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";

            line-height: 1.5;
            color: #333;
            color: #fff;
            width: 200px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div class="box">Hi , I'm Vane Stone.</div>
</body>
